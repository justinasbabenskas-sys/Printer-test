<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrinterCheck Pro - Testinė Versija</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        body { background-color: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-10"></div>

    <script>
        const printers = [
            { id: "EQ-48", name: "Epson (FBA) #1", sn: "N7NE014935", model: "Stylus Pro 7890" },
            { id: "EQ-49", name: "Epson (FBA) #2", sn: "N7NE004947", model: "Stylus Pro 7890" },
            { id: "EQ-50", name: "Epson (FBA) #3", sn: "N7NE007037", model: "Stylus Pro 7890" }
        ];

        let state = { view: 'login', user: null, selectedPrinter: null };

        function render() {
            const app = document.getElementById('app');
            if (state.view === 'login') {
                app.innerHTML = `
                    <div class="p-8 pt-20">
                        <div class="text-center mb-10">
                            <h1 class="text-3xl font-bold text-blue-600 tracking-tight">PrinterCheck<span class="text-gray-800">Pro</span></h1>
                            <p class="text-gray-500">Gamybos valdymo sistema</p>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-xl border border-gray-100">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Darbuotojo ID</label>
                            <input type="text" id="userId" class="w-full p-3 border rounded-xl mb-4 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Pvz. OP-12">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Slaptažodis</label>
                            <input type="password" id="pass" class="w-full p-3 border rounded-xl mb-6 focus:ring-2 focus:ring-blue-500 outline-none" value="1234">
                            <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold hover:bg-blue-700 transition">PRISIJUNGTI</button>
                        </div>
                    </div>`;
            } else if (state.view === 'dashboard') {
                app.innerHTML = `
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-xl font-bold">Sveiki, ${state.user}</h2>
                            <button onclick="state.view='login'; render()" class="text-sm text-red-500">Atsijungti</button>
                        </div>
                        <div class="bg-blue-50 p-4 rounded-xl mb-6 border border-blue-100">
                            <p class="text-blue-800 text-sm font-medium">Iš viso printerių: 50</p>
                            <p class="text-blue-600 text-xs">Skenuokite QR kodą arba pasirinkite iš sąrašo</p>
                        </div>
                        <div class="space-y-3">
                            ${printers.map(p => `
                                <div onclick="openPrinter('${p.id}')" class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex justify-between items-center active:scale-95 transition cursor-pointer">
                                    <div>
                                        <div class="font-bold text-gray-800">${p.id}</div>
                                        <div class="text-xs text-gray-500">${p.name}</div>
                                    </div>
                                    <span class="bg-gray-100 text-gray-400 text-[10px] px-2 py-1 rounded-full uppercase font-bold">Laukia patikros</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            } else if (state.view === 'printer') {
                const p = state.selectedPrinter;
                app.innerHTML = `
                    <div class="p-0">
                        <div class="bg-white p-6 shadow-md relative">
                            <button onclick="state.view='dashboard'; render()" class="absolute top-6 left-4 text-blue-600 font-bold">← Atgal</button>
                            <div class="text-center mt-4">
                                <h2 class="text-2xl font-black text-gray-800">${p.id}</h2>
                                <p class="text-gray-500 text-sm">${p.name}</p>
                            </div>
                        </div>
                        <div class="p-6">
                            <div class="bg-white rounded-2xl p-6 shadow-sm border border-gray-100 mb-6">
                                <h3 class="text-xs font-bold text-gray-400 uppercase mb-4 tracking-widest">Informacija</h3>
                                <div class="grid grid-cols-2 gap-4">
                                    <div><p class="text-[10px] text-gray-400">Modelis</p><p class="text-sm font-medium">${p.model}</p></div>
                                    <div><p class="text-[10px] text-gray-400">S/N</p><p class="text-sm font-medium">${p.sn}</p></div>
                                </div>
                            </div>
                            <div class="bg-blue-600 rounded-2xl p-8 text-center text-white shadow-lg active:bg-blue-700 transition cursor-pointer relative overflow-hidden" onclick="document.getElementById('fileInput').click()">
                                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleUpload()">
                                <div class="relative z-10">
                                    <div class="text-4xl mb-2">📸</div>
                                    <p class="font-bold">Įkelti Nozzle Check</p>
                                    <p class="text-blue-200 text-xs mt-1">Spauskite, kad nufotografuotumėte</p>
                                </div>
                            </div>
                            <div id="status" class="mt-4 hidden text-center p-3 bg-green-100 text-green-700 rounded-xl font-bold">✓ Nuotrauka sėkmingai įkelta</div>
                        </div>
                    </div>`;
            }
        }

        function login() {
            const id = document.getElementById('userId').value;
            if (id) { state.user = id; state.view = 'dashboard'; render(); }
            else { alert('Įveskite darbuotojo ID'); }
        }

        function openPrinter(id) {
            state.selectedPrinter = printers.find(p => p.id === id);
            state.view = 'printer';
            render();
        }

        function handleUpload() {
            document.getElementById('status').classList.remove('hidden');
            setTimeout(() => {
                alert('SISTEMOS PRANEŠIMAS: Nozzle Check duomenys išsaugoti serveryje. Operatorius: ' + state.user);
                state.view = 'dashboard';
                render();
            }, 1500);
        }

        render();
    </script>
</body>
</html>
