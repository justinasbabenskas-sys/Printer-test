<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrinterCheck Pro - QR Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f0f2f5; font-family: sans-serif; }
        #reader { width: 100%; border-radius: 1rem; overflow: hidden; border: none !important; }
    </style>
</head>
<body>
    <div id="app" class="max-w-md mx-auto min-h-screen pb-10"></div>

    <script>
        const printers = [
            { id: "EQ-48", name: "Epson (FBA) #1", sn: "N7NE014935", model: "Stylus Pro 7890" },
            { id: "EQ-49", name: "Epson (FBA) #2", sn: "N7NE004947", model: "Stylus Pro 7890" },
            { id: "EQ-50", name: "Epson (FBA) #3", sn: "N7NE007037", model: "Stylus Pro 7890" }
        ];

        let state = { view: 'login', user: null, selectedPrinter: null };
        let html5QrCode = null;

        function render() {
            const app = document.getElementById('app');
            
            if (state.view === 'login') {
                app.innerHTML = `
                    <div class="p-8 pt-20">
                        <div class="text-center mb-10">
                            <h1 class="text-3xl font-bold text-blue-600">PrinterCheck Pro</h1>
                        </div>
                        <div class="bg-white p-6 rounded-2xl shadow-xl">
                            <input type="text" id="userId" class="w-full p-4 border rounded-xl mb-4" placeholder="Darbuotojo ID">
                            <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold">PRISIJUNGTI</button>
                        </div>
                    </div>`;
            } 
            
            else if (state.view === 'dashboard') {
                app.innerHTML = `
                    <div class="p-4">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="font-bold uppercase text-gray-500 text-sm tracking-widest">Sveiki, ${state.user}</h2>
                            <button onclick="logout()" class="text-red-500 text-sm">Atsijungti</button>
                        </div>
                        
                        <button onclick="startScanner()" class="w-full bg-black text-white p-6 rounded-2xl font-bold mb-6 flex items-center justify-center gap-3 shadow-lg active:scale-95 transition">
                            <span class="text-2xl">📷</span> SKENUOTI QR KODĄ
                        </button>

                        <div id="scanner-container" class="hidden mb-6 bg-black rounded-2xl overflow-hidden relative">
                            <div id="reader"></div>
                            <button onclick="stopScanner()" class="absolute top-2 right-2 bg-red-500 text-white px-3 py-1 rounded-lg z-50">Atšaukti</button>
                        </div>

                        <div class="space-y-3">
                            <p class="text-xs font-bold text-gray-400 uppercase tracking-widest px-2">Rankinis pasirinkimas</p>
                            ${printers.map(p => `
                                <div onclick="openPrinter('${p.id}')" class="bg-white p-4 rounded-xl border flex justify-between items-center active:bg-gray-50">
                                    <div class="font-bold">${p.id}</div>
                                    <div class="text-blue-600 text-sm">Atidaryti →</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            else if (state.view === 'printer') {
                const p = state.selectedPrinter;
                app.innerHTML = `
                    <div class="bg-white p-6 shadow-md flex items-center justify-between">
                        <button onclick="state.view='dashboard'; render()" class="text-blue-600 font-bold">← Grįžti</button>
                        <h2 class="font-black">${p.id}</h2>
                        <div class="w-10"></div>
                    </div>
                    <div class="p-6">
                        <div class="bg-gray-50 p-6 rounded-2xl mb-6 border-2 border-dashed border-gray-200 text-center" onclick="document.getElementById('fileInput').click()">
                            <input type="file" id="fileInput" class="hidden" accept="image/*" capture="camera" onchange="handleUpload()">
                            <div class="text-5xl mb-4">📸</div>
                            <p class="font-bold text-lg text-gray-800">Nufotografuoti Nozzle Check</p>
                            <p class="text-gray-500 text-sm mt-2 font-medium">Paspauskite čia, kad atidarytumėte kamerą</p>
                        </div>
                        <div id="status" class="hidden p-4 bg-green-500 text-white rounded-xl text-center font-bold animate-bounce">
                            Sėkmingai išsiųsta!
                        </div>
                    </div>`;
            }
        }

        // --- LOGIKA ---

        function login() {
            const id = document.getElementById('userId').value;
            if (id) { state.user = id; state.view = 'dashboard'; render(); }
        }

        function logout() {
            stopScanner();
            state.view = 'login';
            render();
        }

        function startScanner() {
            document.getElementById('scanner-container').classList.remove('hidden');
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                // ČIA LOGIKA: Atpažįstame ID iš jūsų URL
                // Jei QR yra "servisas.lt/EQ-48", mes paimame galą
                const foundPrinter = printers.find(p => decodedText.includes(p.id));
                
                if (foundPrinter) {
                    stopScanner();
                    openPrinter(foundPrinter.id);
                } else {
                    alert("Atpažintas kodas: " + decodedText + ". Šio printerio sistemoje nėra.");
                }
            });
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('scanner-container').classList.add('hidden');
                }).catch(() => {});
            }
        }

        function openPrinter(id) {
            state.selectedPrinter = printers.find(p => p.id === id);
            state.view = 'printer';
            render();
        }

        function handleUpload() {
            document.getElementById('status').classList.remove('hidden');
            setTimeout(() => {
                state.view = 'dashboard';
                render();
            }, 2000);
        }

        render();
    </script>
</body>
</html>
