<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrinterCheck Pro v4.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { background-color: #f1f5f9; font-family: -apple-system, system-ui, sans-serif; -webkit-tap-highlight-color: transparent; }
        .btn-ok { border-color: #22c55e !important; background-color: #f0fdf4 !important; color: #166534 !important; box-shadow: 0 4px 0 #15803d; }
        .btn-nok { border-color: #ef4444 !important; background-color: #fef2f2 !important; color: #991b1b !important; box-shadow: 0 4px 0 #b91c1c; }
        #reader { border-radius: 1.5rem; overflow: hidden; border: none !important; }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-xl overflow-x-hidden">
        <div id="main-content"></div>
    </div>

    <script>
        // --- JŪSŲ NAUJAS URL ---
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwWQ-qMDPEOjO1QyhGqjNTOiPqrVneu7sSKo0jitxGfFuzxEbGNTx5y86ClSO_Ljmcb/exec';
        
        const printers = [
            { id: "EQ-48", name: "Epson (FBA) #1" },
            { id: "EQ-49", name: "Epson (FBA) #2" },
            { id: "EQ-50", name: "Epson (FBA) #3" }
        ];

        let state = {
            view: 'login',
            user: localStorage.getItem('pc_user') || null,
            selectedPrinter: null,
            checkStatus: null,
            imageData: null,
            isUploading: false
        };

        function render() {
            const container = document.getElementById('main-content');

            if (!state.user) {
                container.innerHTML = `
                    <div class="p-8 pt-24 text-center">
                        <div class="w-20 h-20 bg-blue-600 rounded-3xl mx-auto mb-8 flex items-center justify-center shadow-lg shadow-blue-200">
                            <span class="text-white text-4xl font-bold">P</span>
                        </div>
                        <h1 class="text-3xl font-black mb-2 tracking-tight">PrinterCheck</h1>
                        <p class="text-slate-400 font-bold text-[10px] uppercase tracking-[0.3em] mb-12 text-center">Gamybos Mazgas</p>
                        <div class="space-y-4">
                            <input type="text" id="login-name" placeholder="Vardas" class="w-full p-5 bg-slate-50 rounded-2xl border-none outline-none ring-2 ring-transparent focus:ring-blue-500 font-bold transition-all">
                            <button onclick="login()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-black text-lg shadow-xl active:scale-95 transition-all uppercase tracking-widest italic">Prisijungti</button>
                        </div>
                    </div>`;
                return;
            }

            if (state.view === 'dashboard') {
                container.innerHTML = `
                    <div class="p-6">
                        <header class="flex justify-between items-center mb-10 border-b pb-6">
                            <div>
                                <p class="text-[9px] font-black text-slate-300 uppercase tracking-widest">Operatorius</p>
                                <h2 class="text-xl font-black text-slate-800 tracking-tight">${state.user}</h2>
                            </div>
                            <button onclick="logout()" class="text-slate-300 font-bold text-xs uppercase tracking-widest border-b border-slate-100">Išeiti</button>
                        </header>

                        <button onclick="startQR()" class="w-full bg-slate-900 text-white p-12 rounded-[2.5rem] mb-12 flex flex-col items-center gap-4 shadow-2xl active:scale-95 transition-all">
                            <span class="text-5xl">📸</span>
                            <span class="text-lg font-black uppercase italic tracking-tighter">Skenuoti QR Kodą</span>
                        </button>

                        <div id="qr-container" class="hidden fixed inset-0 bg-slate-950 z-50 p-6 flex flex-col justify-center">
                            <div class="flex justify-between items-center mb-6 text-white italic">
                                <h3 class="font-black tracking-widest text-blue-400">QR SKENERIS</h3>
                                <button onclick="stopQR()" class="bg-white/10 px-6 py-2 rounded-xl font-bold uppercase text-xs">Uždaryti</button>
                            </div>
                            <div id="reader"></div>
                        </div>

                        <div class="space-y-3">
                            <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest ml-1 mb-2 font-center">Rankinis pasirinkimas</p>
                            ${printers.map(p => `
                                <div onclick="openPrinter('${p.id}')" class="bg-white p-5 rounded-2xl border border-slate-100 flex justify-between items-center shadow-sm active:bg-blue-50 transition-all cursor-pointer">
                                    <span class="font-black text-slate-700 text-lg tracking-tighter">${p.id} — ${p.name}</span>
                                    <span class="text-slate-200">→</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            if (state.view === 'printer') {
                const p = state.selectedPrinter;
                container.innerHTML = `
                    <div class="bg-white p-5 border-b flex items-center justify-between sticky top-0 z-20">
                        <button onclick="state.view='dashboard'; render()" class="text-blue-600 font-black text-xs uppercase tracking-widest">← Atgal</button>
                        <h2 class="text-xl font-black text-slate-900 italic tracking-tighter">${p.id}</h2>
                        <div class="w-12"></div>
                    </div>

                    <div class="p-6 pb-24">
                        <div class="mb-8">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center">1. Purkštukų kokybė</p>
                            <div class="grid grid-cols-2 gap-4">
                                <button onclick="setStatus('OK')" class="p-6 border-2 border-slate-100 rounded-3xl flex flex-col items-center gap-2 transition-all ${state.checkStatus === 'OK' ? 'btn-ok' : 'text-slate-300'}">
                                    <span class="text-2xl">✅</span><span class="font-black uppercase italic tracking-tighter">Geras</span>
                                </button>
                                <button onclick="setStatus('NOK')" class="p-6 border-2 border-slate-100 rounded-3xl flex flex-col items-center gap-2 transition-all ${state.checkStatus === 'NOK' ? 'btn-nok' : 'text-slate-300'}">
                                    <span class="text-2xl">❌</span><span class="font-black uppercase italic tracking-tighter">Blogas</span>
                                </button>
                            </div>
                        </div>

                        <div class="mb-10">
                            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center font-center font-center font-center font-center font-center font-center font-center font-center">2. Nuotrauka patikrai</p>
                            <input type="file" id="file-input" class="hidden" accept="image/*" capture="camera" onchange="processImage(this)">
                            <div id="img-preview" onclick="document.getElementById('file-input').click()" class="w-full aspect-video bg-slate-50 rounded-[2rem] border-2 border-dashed border-slate-200 flex flex-col items-center justify-center overflow-hidden transition-all active:scale-95 shadow-inner">
                                ${state.imageData ? `<img src="${state.imageData}" class="w-full h-full object-cover">` : `
                                <span class="text-4xl mb-2 text-slate-200">📷</span>
                                <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Nufotografuoti</span>`}
                            </div>
                        </div>

                        <button id="submit-btn" onclick="submitData()" class="w-full p-6 rounded-2xl font-black text-xl italic tracking-tighter shadow-2xl transition-all ${state.checkStatus && state.imageData && !state.isUploading ? 'bg-blue-600 text-white shadow-blue-200' : 'bg-slate-200 text-slate-400 cursor-not-allowed'}" ${(!state.checkStatus || !state.imageData || state.isUploading) ? 'disabled' : ''}>
                            ${state.isUploading ? '📦 SIUNČIAMA...' : 'PATEIKTI TECHNOLOGUI'}
                        </button>
                    </div>`;
            }
        }

        // --- FUNKCIJOS ---
        window.login = () => {
            const val = document.getElementById('login-name').value.trim();
            if (val) { localStorage.setItem('pc_user', val); state.user = val; state.view = 'dashboard'; render(); }
        };

        window.logout = () => { localStorage.removeItem('pc_user'); state.user = null; state.view = 'login'; render(); };

        window.openPrinter = (id) => {
            state.selectedPrinter = printers.find(p => p.id === id);
            state.checkStatus = null;
            state.imageData = null;
            state.view = 'printer';
            render();
        };

        window.setStatus = (s) => { state.checkStatus = s; render(); };

        // Nuotraukos apdorojimas ir suspaudimas (Maks. 1200px)
        window.processImage = (input) => {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1000; // Suspaudžiame iki 1000px pločio
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }

                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        state.imageData = canvas.toDataURL('image/jpeg', 0.7); // 70% kokybė (idealus balansas)
                        render();
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        };

        let scanner = null;
        window.startQR = () => {
            document.getElementById('qr-container').classList.remove('hidden');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (txt) => {
                const found = printers.find(p => txt.includes(p.id));
                if (found) { stopQR(); openPrinter(found.id); }
            }).catch(e => alert("Klaida pasiekiant kamerą."));
        };

        window.stopQR = () => { if (scanner) scanner.stop(); document.getElementById('qr-container').classList.add('hidden'); };

        window.submitData = () => {
            if (!state.checkStatus || !state.imageData) return;

            state.isUploading = true;
            render();

            const payload = {
                printerId: state.selectedPrinter.id,
                status: state.checkStatus,
                user: state.user,
                image: state.imageData
            };

            // Naudojame JSON siuntimą be apribojimų
            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify(payload)
            })
            .then(() => {
                alert("Sėkmingai išsiųsta! Duomenys pasirodys lentelėje.");
                state.isUploading = false;
                state.view = 'dashboard';
                render();
            })
            .catch(err => {
                alert("Klaida: " + err);
                state.isUploading = false;
                render();
            });
        };

        render();
    </script>
</body>
</html>
