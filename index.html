<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PrinterCheck</title>
    <style>
        body { font-family: sans-serif; margin: 0; padding: 20px; background: #f4f4f4; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        input, button { width: 100%; padding: 15px; margin-top: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; font-weight: bold; cursor: pointer; border: none; }
        .ok { background: #28a745; margin-bottom: 10px; }
        .nok { background: #dc3545; }
        .hidden { display: none; }
        img { max-width: 100%; margin-top: 10px; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="app" class="card">
        <h2>PrinterCheck Pro</h2>
        <div id="login-view">
            <input type="text" id="user-name" placeholder="Jūsų vardas">
            <button onclick="doLogin()">PRISIJUNGTI</button>
        </div>

        <div id="main-view" class="hidden">
            <p>Sveiki, <b id="display-name"></b></p>
            <hr>
            <div id="printer-list">
                <button onclick="selectPrinter('EQ-48')">EQ-48 (Epson #1)</button>
                <button onclick="selectPrinter('EQ-49')">EQ-49 (Epson #2)</button>
                <button onclick="selectPrinter('EQ-50')">EQ-50 (Epson #3)</button>
            </div>
        </div>

        <div id="check-view" class="hidden">
            <button onclick="goBack()" style="background:none; color:#007bff; font-size:12px;">← ATGAL</button>
            <h3 id="selected-id"></h3>
            <button class="ok" onclick="setStatus('OK')">✅ VISKAS OK</button>
            <button class="nok" onclick="setStatus('NOK')">❌ YRA NOK</button>
            <p id="status-text" style="font-weight:bold;"></p>
            
            <input type="file" id="photo-input" accept="image/*" capture="camera" onchange="preview(this)">
            <div id="preview-area"></div>
            
            <button id="send-btn" class="hidden" style="background:#333;" onclick="upload()">SIŲSTI TECHNOLOGUI</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqW-qMDPEOjO1QyhGqjNTOiPqrVneu7sSKo0jitxGfFuzxEbGNTx5y86ClSO_Ljmcb/exec';
        let currentUser = "";
        let currentPrinter = "";
        let currentStatus = "";
        let currentImage = "";

        function doLogin() {
            const name = document.getElementById('user-name').value;
            if (name) {
                currentUser = name;
                document.getElementById('display-name').innerText = name;
                document.getElementById('login-view').classList.add('hidden');
                document.getElementById('main-view').classList.remove('hidden');
            }
        }

        function selectPrinter(id) {
            currentPrinter = id;
            document.getElementById('selected-id').innerText = id;
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('check-view').classList.remove('hidden');
        }

        function setStatus(s) {
            currentStatus = s;
            document.getElementById('status-text').innerText = "PASIRINKTA: " + s;
            checkReady();
        }

        function preview(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    currentImage = e.target.result;
                    document.getElementById('preview-area').innerHTML = '<img src="'+e.target.result+'">';
                    checkReady();
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkReady() {
            if (currentStatus && currentImage) {
                document.getElementById('send-btn').classList.remove('hidden');
            }
        }

        function goBack() {
            document.getElementById('check-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            currentStatus = ""; currentImage = "";
            document.getElementById('preview-area').innerHTML = "";
            document.getElementById('status-text').innerText = "";
        }

        function upload() {
            const btn = document.getElementById('send-btn');
            btn.innerText = "SIUNČIAMA...";
            btn.disabled = true;

            const payload = {
                printerId: currentPrinter,
                status: currentStatus,
                user: currentUser,
                image: currentImage
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }).then(() => {
                alert("Pavyko! Duomenys lentelėje.");
                location.reload();
            }).catch(e => {
                alert("Klaida: " + e);
                btn.disabled = false;
                btn.innerText = "BANDYTI DAR KARTĄ";
            });
        }
    </script>
</body>
</html>
