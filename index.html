<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PrinterCheck Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans">
    <div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-lg relative">
        <div id="loading" class="p-20 text-center text-gray-400">Kraunama sistema...</div>
    </div>

    <script>
        // JŪSŲ NAUJAUSIAS URL IŠ GOOGLE SCRIPTS
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwqW-qMDPEOjO1QyhGqjNTOiPqrVneu7sSKo0jitxGfFuzxEbGNTx5y86ClSO_Ljmcb/exec';

        const printers = [
            { id: "EQ-48", name: "Epson #1" },
            { id: "EQ-49", name: "Epson #2" },
            { id: "EQ-50", name: "Epson #3" }
        ];

        let state = {
            view: localStorage.getItem('pc_user') ? 'dashboard' : 'login',
            user: localStorage.getItem('pc_user') || null,
            selectedPrinter: null,
            checkStatus: null,
            image: null
        };

        function render() {
            const app = document.getElementById('app');
            
            if (state.view === 'login') {
                app.innerHTML = `
                    <div class="p-8 pt-24 text-center">
                        <h1 class="text-3xl font-black text-blue-600 mb-2 italic">PrinterCheck</h1>
                        <p class="text-gray-400 text-xs mb-12 uppercase tracking-widest">Gamybos Kontrolė</p>
                        <div class="space-y-4">
                            <input type="text" id="u-name" placeholder="Vardas" class="w-full p-5 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-blue-500 font-bold">
                            <button onclick="login()" class="w-full bg-blue-600 text-white p-5 rounded-2xl font-bold shadow-lg">PRISIJUNGTI</button>
                        </div>
                    </div>`;
            } 
            
            else if (state.view === 'dashboard') {
                app.innerHTML = `
                    <div class="p-6">
                        <div class="flex justify-between items-center mb-10 border-b pb-4">
                            <h2 class="font-bold text-gray-800">${state.user}</h2>
                            <button onclick="logout()" class="text-xs text-red-400 font-bold">IŠEITI</button>
                        </div>
                        <button onclick="startScanner()" class="w-full bg-black text-white p-10 rounded-[2.5rem] mb-10 flex flex-col items-center gap-4 shadow-xl active:scale-95 transition-all">
                            <span class="text-5xl">📷</span>
                            <span class="font-black uppercase tracking-tighter italic">Skenuoti QR Kodą</span>
                        </button>
                        <div id="reader" class="hidden mb-6 rounded-2xl overflow-hidden border"></div>
                        <div class="space-y-3">
                            <p class="text-[10px] font-bold text-gray-300 uppercase ml-1">Rankinis sąrašas</p>
                            ${printers.map(p => `
                                <div onclick="openP('${p.id}')" class="p-5 border rounded-2xl flex justify-between items-center active:bg-gray-50">
                                    <span class="font-black text-gray-700">${p.id}</span>
                                    <span class="text-gray-300">→</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            else if (state.view === 'printer') {
                const p = state.selectedPrinter;
                app.innerHTML = `
                    <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                        <button onclick="state.view='dashboard';render()" class="text-blue-600 font-bold">← ATGAL</button>
                        <h2 class="font-black uppercase italic">${p.id}</h2>
                        <div class="w-10"></div>
                    </div>
                    <div class="p-6">
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <button onclick="setStatus('OK')" class="p-6 border-4 rounded-3xl flex flex-col items-center gap-2 ${state.checkStatus === 'OK' ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-50 text-gray-300'}">
                                <span class="text-2xl font-bold">✅ OK</span>
                            </button>
                            <button onclick="setStatus('NOK')" class="p-6 border-4 rounded-3xl flex flex-col items-center gap-2 ${state.checkStatus === 'NOK' ? 'border-red-500 bg-red-50 text-red-700' : 'border-gray-50 text-gray-300'}">
                                <span class="text-2xl font-bold">❌ NOK</span>
                            </button>
                        </div>
                        <input type="file" id="f-in" class="hidden" accept="image/*" capture="camera" onchange="procImg(this)">
                        <div onclick="document.getElementById('f-in').click()" class="w-full aspect-video bg-gray-50 rounded-3xl border-2 border-dashed flex flex-col items-center justify-center mb-10 overflow-hidden relative">
                            ${state.image ? `<img src="${state.image}" class="w-full h-full object-cover">` : '<span class="text-gray-400 font-bold uppercase text-xs tracking-widest">📸 Nufotografuoti</span>'}
                        </div>
                        <button id="send-btn" onclick="send()" class="w-full p-5 rounded-2xl font-black italic tracking-tighter ${state.checkStatus && state.image ? 'bg-blue-600 text-white shadow-xl' : 'bg-gray-100 text-gray-300 cursor-not-allowed'}" ${!state.checkStatus || !state.image ? 'disabled' : ''}>PATEIKTI TECHNOLOGUI</button>
                    </div>`;
            }
        }

        // --- FUNKCIJOS ---
        window.login = () => {
            const n = document.getElementById('u-name').value.trim();
            if(n) { localStorage.setItem('pc_user', n); state.user = n; state.view = 'dashboard'; render(); }
        };

        window.logout = () => { localStorage.removeItem('pc_user'); state.user = null; state.view = 'login'; render(); };

        window.openP = (id) => { 
            state.selectedPrinter = printers.find(p => p.id === id); 
            state.checkStatus = null; state.image = null; state.view = 'printer'; 
            render(); 
        };

        window.setStatus = (s) => { state.checkStatus = s; render(); };

        window.procImg = (i) => {
            if(i.files[0]) {
                const r = new FileReader();
                r.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_W = 1000;
                        let w = img.width, h = img.height;
                        if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        state.image = canvas.toDataURL('image/jpeg', 0.7);
                        render();
                    };
                    img.src = e.target.result;
                };
                r.readAsDataURL(i.files[0]);
            }
        };

        let scanner = null;
        window.startScanner = () => {
            const r = document.getElementById('reader'); r.classList.remove('hidden');
            scanner = new Html5Qrcode("reader");
            scanner.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, (t) => {
                const p = printers.find(x => t.includes(x.id));
                if(p) { scanner.stop(); r.classList.add('hidden'); openP(p.id); }
            }).catch(e => alert("Klaida: " + e));
        };

        window.send = () => {
            const btn = document.getElementById('send-btn');
            btn.innerText = "SIUNČIAMA..."; btn.disabled = true;
            
            const payload = { printerId: state.selectedPrinter.id, status: state.checkStatus, user: state.user, image: state.image };
            
            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) })
            .then(() => { 
                alert("✅ Pavyko! Duomenys išsiųsti."); 
                state.view = 'dashboard'; 
                render(); 
            })
            .catch(e => { 
                alert("Klaida: " + e); 
                btn.disabled = false; btn.innerText = "PATEIKTI TECHNOLOGUI"; 
            });
        };

        // Pradžia
        document.getElementById('loading').remove();
        render();
    </script>
</body>
</html>
