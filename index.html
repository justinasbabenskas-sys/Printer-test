<!DOCTYPE html>
<html lang="lt">
<head>

    <title>PrinterCheck Pro - QR Scanner</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>

                app.innerHTML = `

                            <button onclick="login()" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-bold shadow-lg active:scale-95 transition">PRISIJUNGTI</button>
                        </div>
                    </div>`;
            }

                                <span>SKENUOTI QR KODĄ</span>
                            </button>
                        </div>

                        <div id="scanner-wrapper" class="hidden fixed inset-0 bg-black z-50 p-4 flex flex-col justify-center">
                            <div class="flex justify-between items-center mb-4 text-white">
                                <h3 class="font-bold text-lg">Skenuokite printerio QR</h3>
                                <button onclick="stopScanner()" class="bg-white/20 px-4 py-2 rounded-xl text-sm font-bold">Uždaryti</button>
                            </div>
                            <div id="reader" class="overflow-hidden rounded-3xl border-2 border-white/30"></div>

                                    <div>
                                        <div class="font-black text-gray-800 text-lg">${p.id}</div>
                                        <div class="text-xs text-gray-500">${p.name}</div>
                                    </div>
                                    <div class="h-10 w-10 bg-blue-50 rounded-full flex items-center justify-center text-blue-600">→</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>`;
            }

            else if (state.view === 'printer') {
                const p = state.selectedPrinter;
                app.innerHTML = `
                    <div class="fixed top-0 left-0 right-0 bg-white p-4 border-b flex items-center justify-between z-10">

                        <div class="text-center leading-tight">
                            <h2 class="font-black text-gray-800 uppercase tracking-tighter">${p.id}</h2>
                            <p class="text-[10px] text-gray-400 font-bold uppercase">${p.sn}</p>
